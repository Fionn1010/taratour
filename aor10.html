<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AOR 10 · Stone of Destiny Test</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #efe3cc;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    model-viewer {
      width: 100%;
      height: 500px;
      background: #000;
      border-radius: 16px;
      border: 1px solid #273244;
    }

    .btn {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-primary {
      background: #d4b27a;
      color: #000;
    }
  </style>
</head>

<body>
  <main class="shell">
    <h1>AOR 10 · Stone of Destiny (Dual Model Test)</h1>
    <p>This test confirms multiple 3D models can render on screen simultaneously.</p>

    <div class="grid">

      <!-- Model 1 -->
      <model-viewer
        id="viewer1"
        src="./assets/model/stone_of_destiny.glb"
        alt="Stone of Destiny Model 1"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1">
      </model-viewer>

      <!-- Model 2 -->
      <model-viewer
        id="viewer2"
        src="./assets/model/stone_of_destiny.glb"
        alt="Stone of Destiny Model 2"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1">
      </model-viewer>

    </div>

    <button class="btn btn-primary" onclick="rotateBoth()">Toggle Rotation</button>
  </main>

  <script>
    let rotating = true;

    function rotateBoth() {
      const v1 = document.getElementById('viewer1');
      const v2 = document.getElementById('viewer2');

      rotating = !rotating;

      v1.autoRotate = rotating;
      v2.autoRotate = rotating;
    }
  </script>
</body>
</html>
