<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mound of the Hostages AR Test</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {font-family: Arial; background:#0b0f14; color:#efe3cc; padding:20px;}
h1 {margin-bottom:10px;}
button {margin:5px; padding:10px 14px; border-radius:10px; border:none; cursor:pointer;}
.primary {background:#d4b27a; color:#140f09;}
.secondary {background:#1b2433; color:#efe3cc;}
</style>
</head>

<body>

<h1>Mound of the Hostages · AR Test</h1>
<p>Testing orthostat model for burial chamber experience.</p>

<model-viewer
id="viewer"
src="./assets/model/orthostat.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
style="width:100%; height:500px;">
<button slot="ar-button" class="primary">Launch AR Mound</button>
</model-viewer>

<div>
<button class="primary" onclick="launchAR()">Launch AR</button>
<button class="secondary" onclick="toggleRotation()">Toggle Rotation</button>
<button class="secondary" onclick="reset()">Reset</button>
</div>

<p>Scale: <span id="scaleLabel">1.0</span></p>
<input type="range" min="0.5" max="4" step="0.1" value="1" oninput="setScale(this.value)">

<script>
const viewer = document.getElementById('viewer');
let rotating = true;

function launchAR(){
  if(viewer.activateAR){ viewer.activateAR(); }
}

function toggleRotation(){
  rotating = !rotating;
  viewer.autoRotate = rotating;
}

function reset(){
  viewer.scale = "1 1 1";
  viewer.cameraOrbit = "0deg 75deg 105%";
}

function setScale(val){
  viewer.scale = val + " " + val + " " + val;
  document.getElementById('scaleLabel').innerText = val;
}
</script>

</body>
</html>
