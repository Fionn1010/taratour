<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hill of Tara · Belly AR Photo</title>

  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(11, 15, 20, 0.82);
      --text: #efe3cc;
      --accent: #d4b27a;
      --muted: #1b2433;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    #camera {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      transform: scaleX(-1);
    }

    #threeWrap,
    #threeWrap canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 20;
      pointer-events: none;
    }

    .topbar {
      top: 0;
      padding: 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0));
    }

    .titleCard {
      max-width: 420px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .titleCard h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .titleCard p {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      opacity: 0.92;
    }

    .bottomBar {
      bottom: 0;
      padding: 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.78), rgba(0,0,0,0));
      pointer-events: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      pointer-events: auto;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 15px;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #140f09;
      font-weight: 700;
    }

    .secondary {
      background: var(--muted);
      color: var(--text);
    }

    .danger {
      background: #6d2f2f;
      color: #fff;
    }

    .sliderWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      padding: 10px 12px;
      border-radius: 12px;
      min-width: 210px;
    }

    input[type="range"] {
      width: 120px;
    }

    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: rgba(0,0,0,0.78);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 90vw;
      text-align: center;
      display: none;
    }

    #snapshotPanel {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: rgba(0,0,0,0.94);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px;
    }

    #snapshotPreview {
      max-width: 100%;
      max-height: 74vh;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .hint {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="camera" autoplay playsinline muted></video>
    <div id="threeWrap"></div>

    <div class="overlay topbar">
      <div class="titleCard">
        <h1>Hill of Tara · Belly Photo AR</h1>
        <p>Loads <strong>belly.glb</strong> over your live camera so you can pose with it and save a photo.</p>
        <div class="hint">Move the model with the arrow buttons. Use pinch/zoom slider to resize. Best on phone.</div>
      </div>
    </div>

    <div id="status"></div>

    <div class="overlay bottomBar">
      <div class="controls">
        <button class="primary" id="startBtn">Start Camera</button>
        <button class="primary" id="photoBtn">Take Photo</button>
        <button class="secondary" id="resetBtn">Reset Model</button>
        <button class="secondary" id="turnBtn">Turn 15°</button>

        <button class="secondary" id="leftBtn">←</button>
        <button class="secondary" id="rightBtn">→</button>
        <button class="secondary" id="upBtn">↑</button>
        <button class="secondary" id="downBtn">↓</button>

        <div class="sliderWrap">
          <label for="scaleRange">Scale</label>
          <input id="scaleRange" type="range" min="0.2" max="3" step="0.05" value="1" />
          <span id="scaleLabel">1.00×</span>
        </div>
      </div>
    </div>

    <div id="snapshotPanel">
      <img id="snapshotPreview" alt="Your AR photo" />
      <div class="controls" style="pointer-events:auto; justify-content:center;">
        <a id="downloadBtn" class="primary" href="#" download="hill-of-tara-belly-photo.png" style="text-decoration:none; display:inline-block;">Save Photo</a>
        <button class="secondary" id="closePreviewBtn">Close Preview</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const video = document.getElementById('camera');
    const wrap = document.getElementById('threeWrap');
    const statusBox = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const photoBtn = document.getElementById('photoBtn');
    const resetBtn = document.getElementById('resetBtn');
    const turnBtn = document.getElementById('turnBtn');
    const scaleRange = document.getElementById('scaleRange');
    const scaleLabel = document.getElementById('scaleLabel');
    const snapshotPanel = document.getElementById('snapshotPanel');
    const snapshotPreview = document.getElementById('snapshotPreview');
    const downloadBtn = document.getElementById('downloadBtn');
    const closePreviewBtn = document.getElementById('closePreviewBtn');

    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const upBtn = document.getElementById('upBtn');
    const downBtn = document.getElementById('downBtn');

    let scene, camera, renderer, loader;
    let model;
    let currentStream;

    const state = {
      x: 0,
      y: -0.25,
      z: -2.2,
      scale: 1,
      rotY: 0
    };

    function showStatus(message, persist = false) {
      statusBox.textContent = message;
      statusBox.style.display = 'block';
      if (!persist) {
        clearTimeout(showStatus._t);
        showStatus._t = setTimeout(() => {
          statusBox.style.display = 'none';
        }, 2200);
      }
    }

    function initThree() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
      camera.position.set(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      wrap.appendChild(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 2.2);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.8);
      dir.position.set(2, 4, 3);
      scene.add(dir);

      loader = new GLTFLoader();
      loadModel();
      animate();
    }

    function loadModel() {
      showStatus('Loading belly.glb…', true);
      loader.load(
        './belly.glb',
        (gltf) => {
          model = gltf.scene;
          scene.add(model);

          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);
          model.position.sub(center);

          const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
          const normalize = 1 / maxDim;
          model.scale.setScalar(normalize);

          applyModelState();
          showStatus('Model loaded');
        },
        undefined,
        (err) => {
          console.error(err);
          showStatus('Could not load belly.glb. Put belly.glb in the same folder as this HTML file.', true);
        }
      );
    }

    function applyModelState() {
      if (!model) return;
      model.position.set(state.x, state.y, state.z);
      model.rotation.set(0, state.rotY, 0);
      const s = state.scale;
      model.scale.setScalar(s * 1);
    }

    async function startCamera() {
      try {
        if (currentStream) {
          currentStream.getTracks().forEach(t => t.stop());
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: false
        });

        currentStream = stream;
        video.srcObject = stream;
        await video.play();
        showStatus('Camera started');
      } catch (err) {
        console.error(err);
        showStatus('Camera access was blocked. Allow camera permission and reload.', true);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      if (renderer && scene && camera) renderer.render(scene, camera);
    }

    function resize() {
      if (!renderer || !camera) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function capturePhoto() {
      if (!video.videoWidth || !renderer) {
        showStatus('Start the camera first', true);
        return;
      }

      const out = document.createElement('canvas');
      out.width = video.videoWidth;
      out.height = video.videoHeight;
      const ctx = out.getContext('2d');

      ctx.translate(out.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, out.width, out.height);
      ctx.setTransform(1, 0, 0, 1, 0, 0);

      ctx.drawImage(renderer.domElement, 0, 0, out.width, out.height);

      const dataUrl = out.toDataURL('image/png');
      snapshotPreview.src = dataUrl;
      downloadBtn.href = dataUrl;
      snapshotPanel.style.display = 'flex';
    }

    function resetModel() {
      state.x = 0;
      state.y = -0.25;
      state.z = -2.2;
      state.scale = 1;
      state.rotY = 0;
      scaleRange.value = '1';
      scaleLabel.textContent = '1.00×';
      applyModelState();
      showStatus('Model reset');
    }

    function move(dx, dy) {
      state.x += dx;
      state.y += dy;
      applyModelState();
    }

    startBtn.addEventListener('click', startCamera);
    photoBtn.addEventListener('click', capturePhoto);
    resetBtn.addEventListener('click', resetModel);
    turnBtn.addEventListener('click', () => {
      state.rotY += Math.PI / 12;
      applyModelState();
    });

    leftBtn.addEventListener('click', () => move(-0.12, 0));
    rightBtn.addEventListener('click', () => move(0.12, 0));
    upBtn.addEventListener('click', () => move(0, 0.12));
    downBtn.addEventListener('click', () => move(0, -0.12));

    scaleRange.addEventListener('input', (e) => {
      state.scale = parseFloat(e.target.value);
      scaleLabel.textContent = `${state.scale.toFixed(2)}×`;
      applyModelState();
    });

    closePreviewBtn.addEventListener('click', () => {
      snapshotPanel.style.display = 'none';
    });

    window.addEventListener('resize', resize);

    initThree();
  </script>
</body>
</html>
