<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hill of Tara Tours</title>
  <style>
    body {

      font-family: Arial, sans-serif;

      align-items:center;
      justify-content:center;
      height:100vh;
    }
    .container {
      text-align:center;
      max-width:500px;
      padding:30px;
      background:#121925;
      border-radius:20px;
      border:1px solid #273244;
      box-shadow:0 20px 50px rgba(0,0,0,0.5);
    }
    h1 {
      margin-bottom:10px;
    }
    p {
      color:#b6ab99;
      margin-bottom:30px;
    }
    .btn {
      display:block;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
    }
    .primary {
      background:linear-gradient(180deg,#d4b27a,#9f7d48);
      color:#140f09;
    }
    .secondary {
      background:#1b2433;
      color:#efe3cc;
      border:1px solid #273244;

<div class="container">
  <h1>Hill of Tara</h1>
  <p>Select your experience</p>

  <a href="./tour.html" class="btn primary">
