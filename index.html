<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hill of Tara Tour</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 20px;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a.button {
      display: block;
      padding: 14px;
      background: #1f6feb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
    }

    a.secondary {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
    }

  </style>
</head>

<body>
  <div class="hero">
    <img src="./assets/image/tara-hero.jpg" alt="Hill of Tara">

    <div class="overlay"></div>

    <div class="content">
      <h1>Welcome to the Hill of Tara</h1>
      <p>Choose your experience</p>

      <div class="buttons">
        <a href="tour.html" class="button">Start Tour</a>
        <a href="mr.html" class="button secondary">Mixed Reality Tour</a>
      </div>
    </div>
  </div>
</body>
</html>
