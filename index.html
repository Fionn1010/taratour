<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill of Tara Tour</title>

<style>

*{box-sizing:border-box}

html{scroll-behavior:smooth}

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
}

.hero{
min-height:100vh;
background-image:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.7)),url("assets/tarabg.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.hero-content h1{
font-size:clamp(2.2rem,6vw,4rem);
margin-bottom:10px;
}

.hero-content p{
font-size:clamp(1rem,2.8vw,1.4rem);
margin-bottom:20px;
}

.hero-content button{
padding:15px 30px;
font-size:18px;
background:#d4af37;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.section{
padding:60px 20px 100px;
max-width:900px;
margin:auto;
}

.status-box{
background:#1c1c1c;
border:1px solid #333;
border-radius:12px;
padding:24px;
margin-top:20px;
}

.status{
font-size:1.1rem;
color:#ddd;
line-height:1.6;
}

.small{
font-size:.95rem;
color:#aaa;
margin-top:12px;
}

.coords{
margin-top:16px;
color:#cfcfcf;
font-size:.95rem;
}

</style>
</head>

<body>

<section class="hero">
<div class="hero-content">
<h1>Hill of Tara</h1>
<p>Seat of the High Kings of Ireland</p>
<button id="startButton">Begin the Tour</button>
</div>
</section>

<section id="tourSection" class="section">

<h2 id="locationTitle">Waiting to begin...</h2>

<div class="status-box">

<p class="status" id="status">
Tap “Begin the Tour” and allow location access.
</p>

<p class="small">
For GPS to work this page must be opened through GitHub Pages or another HTTPS site.
</p>

<div class="coords" id="coords"></div>

</div>

</section>

<audio id="patrickAudio" src="assets/Exploring St. Patrick's Church History.mp3" preload="auto"></audio>
<audio id="hostagesAudio" src="assets/Mound of the Hostages.mp3" preload="auto"></audio>

<script>

let patrickPlayed=false;
let hostagesPlayed=false;
let watchId=null;

const startButton=document.getElementById("startButton");
const statusEl=document.getElementById("status");
const titleEl=document.getElementById("locationTitle");
const coordsEl=document.getElementById("coords");

startButton.addEventListener("click",startTour);

function startTour(){

document.getElementById("tourSection").scrollIntoView({behavior:"smooth"});

if(!navigator.geolocation){

statusEl.textContent="Geolocation not supported on this device.";

return;

}

statusEl.textContent="Starting GPS… please allow location access.";

titleEl.textContent="Looking for your location...";

if(watchId!==null){

navigator.geolocation.clearWatch(watchId);

}

watchId=navigator.geolocation.watchPosition(

checkLocation,

handleLocationError,

{

enableHighAccuracy:true,
maximumAge:5000,
timeout:15000

}

);

}

function handleLocationError(error){

if(error.code===error.PERMISSION_DENIED){

statusEl.textContent="Location permission denied.";

}

else if(error.code===error.POSITION_UNAVAILABLE){

statusEl.textContent="Location unavailable.";

}

else if(error.code===error.TIMEOUT){

statusEl.textContent="Location request timed out.";

}

else{

statusEl.textContent="Unknown GPS error.";

}

}

function checkLocation(position){

const lat=position.coords.latitude;
const lon=position.coords.longitude;
const accuracy=Math.round(position.coords.accuracy);

coordsEl.textContent="Lat: "+lat.toFixed(6)+" | Lon: "+lon.toFixed(6)+" | Accuracy: "+accuracy+"m";

statusEl.textContent="GPS active. Move around Tara to trigger tour stops.";

const patrickLat=53.5809;
const patrickLon=-6.6105;

const hostagesLat=53.5815;
const hostagesLon=-6.6113;

const patrickDistance=distance(lat,lon,patrickLat,patrickLon);
const hostagesDistance=distance(lat,lon,hostagesLat,hostagesLon);

if(patrickDistance<40 && !patrickPlayed){

titleEl.textContent="St Patrick's Church";

statusEl.textContent="You reached St Patrick's Church. Playing audio...";

document.getElementById("patrickAudio").play();

patrickPlayed=true;

}

if(hostagesDistance<40 && !hostagesPlayed){

titleEl.textContent="Mound of the Hostages";

statusEl.textContent="You reached the Mound of the Hostages. Playing audio...";

document.getElementById("hostagesAudio").play();

hostagesPlayed=true;

}

}

function distance(lat1,lon1,lat2,lon2){

const R=6371e3;

const φ1=lat1*Math.PI/180;
const φ2=lat2*Math.PI/180;

const Δφ=(lat2-lat1)*Math.PI/180;
const Δλ=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(Δφ/2)*Math.sin(Δφ/2)+
Math.cos(φ1)*Math.cos(φ2)*
Math.sin(Δλ/2)*Math.sin(Δλ/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

</script>

</body>
</html>
