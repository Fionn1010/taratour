<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hill of Tara Tour</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <video id="sceneVideo" playsinline muted loop poster=""></video>

    <div id="loadingScreen">
      <div class="loadingCard">
        <h1>Hill of Tara</h1>
        <p>GPS Mobile Tour</p>
        <button id="startTour" class="primaryButton">Start Tour</button>
      </div>
    </div>

    <div id="topBar">
      <div id="gpsStatus">GPS not started</div>
      <div id="locationDot" aria-label="Location status"></div>
    </div>

    <main class="overlay">
      <div class="panel">
        <div class="eyebrow">Ancient Ireland</div>
        <h1 class="title" id="sceneTitle">Welcome to the Hill of Tara</h1>
        <p class="description" id="sceneDescription">
          Tap Start Tour to enable location and begin the Tara mobile experience.
        </p>

        <div class="metaRow">
          <span class="pill" id="nearestStop">Nearest stop: —</span>
          <span class="pill" id="distanceAway">Distance: —</span>
        </div>

        <div class="buttonContainer">
          <button id="prevStopBtn" class="secondaryButton" type="button">Previous</button>
          <button id="playNarrationBtn" class="primaryButton" type="button">Play Narration</button>
          <button id="nextStopBtn" class="secondaryButton" type="button">Next</button>
        </div>

        <div class="buttonContainer secondaryRow">
          <button id="recenterBtn" class="ghostButton" type="button">Check My Location</button>
          <button id="stopTourBtn" class="ghostButton" type="button">Stop Voice</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
