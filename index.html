<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hill of Tara Tour</title>
</head>

<body>
  <h1>Hill of Tara Tour</h1>

  <p>Welcome to your offline-ready tour.</p>

  <a href="./tour.html">Start Tour</a>

  <p id="status">Loading...</p>

  <script>
    const status = document.getElementById("status");

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then((reg) => {
            console.log("Service Worker registered", reg);
            status.textContent = "Service Worker registered ✅";
          })
          .catch((err) => {
            console.error("Service Worker failed", err);
            status.textContent = "Service Worker failed ❌";
          });
      });
    } else {
      status.textContent = "Service Workers not supported";
    }
  </script>
</body>
</html>
