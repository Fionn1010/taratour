<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill of Tara Tour</title>

<style>
body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
max-width:760px;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:24px;
text-align:center;
}

.hero{
position:relative;
aspect-ratio:16/9;
overflow:hidden;
border-radius:16px;
margin-bottom:18px;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transition:opacity 1.2s ease;
}

.hero img.top{
opacity:0;
}

.hero.show-ancient img.top{
opacity:1;
}

button{
border:none;
border-radius:999px;
padding:12px 20px;
font-size:16px;
cursor:pointer;
margin:6px;
}

.primary{background:#22c55e;color:#052e16;font-weight:bold;}
.secondary{background:#e2e8f0;color:#0f172a;}
.status{margin-top:12px;font-size:14px;color:#bfdbfe;}
</style>
</head>

<body>

<div class="container">

<h1>Hill of Tara Tour</h1>

<div class="hero" id="hero">
<img src="images/entrance.jpg" alt="Modern Tara entrance view">
<img class="top" src="images/entrance-ancient.jpg" alt="Ancient Tara reconstruction">
</div>

<button class="secondary" onclick="toggleFade()">Fade Into Ancient Tara</button>

<p>
Welcome to the Hill of Tara, the ancient seat of the High Kings of Ireland.
</p>

<a href="tour.html"><button class="primary">Start Walking Tour</button></a>
<button class="secondary" onclick="showLocation()">Check My Location</button>
<button class="secondary" onclick="cacheFiles()">Cache Tour Files</button>

<div class="status" id="status">Ready</div>

</div>

<script>

const hero=document.getElementById("hero")
const status=document.getElementById("status")

function toggleFade(){
hero.classList.toggle("show-ancient")
}

function showLocation(){
if(!navigator.geolocation){
status.innerText="Geolocation not supported"
return
}

status.innerText="Checking location..."

navigator.geolocation.getCurrentPosition(pos=>{
status.innerText="Location: "+pos.coords.latitude.toFixed(5)+", "+pos.coords.longitude.toFixed(5)
},()=>{
status.innerText="Unable to retrieve location"
})
}

async function cacheFiles(){
if(!('caches' in window)){
status.innerText="Caching not supported"
return
}

const files=[
"./",
"./index.html",
"./tour.html",
"./images/entrance.jpg",
"./images/entrance-ancient.jpg"
]

try{
const cache=await caches.open("tara-cache-v1")
await cache.addAll(files)
status.innerText="Tour cached for offline use"
}catch(e){
status.innerText="Some files could not be cached"
}
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
