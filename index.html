<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill of Tara Tour</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0f14;
  color:#f2e6d0;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.hero{
  padding:40px 20px;
  text-align:center;
}

h1{
  font-size:2.5rem;
  margin-bottom:10px;
}

p{
  color:#cbbfa6;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 20px;
  background:#d4b27a;
  color:#000;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

.section{
  margin-top:40px;
}

.map{
  margin-top:20px;
  text-align:center;
}

.map img{
  width:100%;
  max-width:800px;
  border-radius:12px;
}

.stops{
  margin-top:30px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#111826;
  padding:15px;
  border-radius:10px;
}

@media(max-width:600px){
  .stops{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>Hill of Tara Tour</h1>
  <p>Walk the journey of a High King through a cinematic mobile experience.</p>
  <a class="btn" href="./tour.html">Start Tour</a>
</div>

<div class="section">
  <h2>Journey Map</h2>
  <div class="map">
    <img src="./assets/image/tara_map.png" alt="Tara Map">
  </div>
</div>

<div class="section">
  <h2>Tour Stops</h2>
  <div class="stops">
    <div class="card">Entrance</div>
    <div class="card">Banqueting Hall</div>
    <div class="card">Rath of the Synods</div>
    <div class="card">Mound of the Hostages</div>
    <div class="card">Stone of Destiny</div>
    <div class="card">Teach Cormaic</div>
  </div>
</div>

</div>

</body>
</html>
