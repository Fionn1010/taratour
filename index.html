<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill of Tara Tour</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
}

.hero{
height:100vh;
background-image:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.7)), url("assets/tarabg.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

.hero-content h1{
font-size:48px;
margin-bottom:10px;
}

.hero-content p{
font-size:20px;
margin-bottom:20px;
}

.hero-content button{
padding:15px 30px;
font-size:18px;
background:#d4af37;
border:none;
border-radius:6px;
cursor:pointer;
}

.section{
padding:60px 20px;
}

.status{
font-size:20px;
margin-top:20px;
color:#ccc;
}

</style>
</head>

<body>

<section class="hero">
<div class="hero-content">
<h1>Hill of Tara</h1>
<p>Seat of the High Kings of Ireland</p>
<button onclick="startTour()">Start Tour</button>
</div>
</section>

<div class="section">

<h2 id="locationTitle">Waiting for location...</h2>

<p class="status" id="status">
Press Start Tour and allow GPS access
</p>

</div>


<audio id="patrickAudio" src="assets/Exploring St. Patrick's Church History.mp3"></audio>
<audio id="hostagesAudio" src="assets/Mound of the Hostages.mp3"></audio>

<script>

let patrickPlayed = false;
let hostagesPlayed = false;

function startTour(){

navigator.geolocation.watchPosition(checkLocation);

document.getElementById("status").innerText="GPS tracking started...";
}


function checkLocation(position){

let lat = position.coords.latitude;
let lon = position.coords.longitude;


/* ST PATRICKS CHURCH */

let patrickLat = 53.5809;
let patrickLon = -6.6105;


/* MOUND OF HOSTAGES */

let hostagesLat = 53.5815;
let hostagesLon = -6.6113;


let patrickDistance = distance(lat,lon,patrickLat,patrickLon);
let hostagesDistance = distance(lat,lon,hostagesLat,hostagesLon);


/* Trigger Patrick */

if(patrickDistance < 40 && !patrickPlayed){

document.getElementById("locationTitle").innerText="St Patrick's Church";

document.getElementById("patrickAudio").play();

patrickPlayed = true;

}


/* Trigger Mound */

if(hostagesDistance < 40 && !hostagesPlayed){

document.getElementById("locationTitle").innerText="Mound of the Hostages";

document.getElementById("hostagesAudio").play();

hostagesPlayed = true;

}

}



/* distance calculation */

function distance(lat1,lon1,lat2,lon2){

let R = 6371e3;

let φ1 = lat1 * Math.PI/180;
let φ2 = lat2 * Math.PI/180;

let Δφ = (lat2-lat1) * Math.PI/180;
let Δλ = (lon2-lon1) * Math.PI/180;

let a =
Math.sin(Δφ/2) * Math.sin(Δφ/2) +
Math.cos(φ1) * Math.cos(φ2) *
Math.sin(Δλ/2) * Math.sin(Δλ/2);

let c = 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R * c;

}

</script>

</body>
</html>
