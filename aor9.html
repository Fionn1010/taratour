<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AOR 9 · King Model Test</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body style="margin:0;font-family:Arial;background:#0b0f14;color:#efe3cc;">

<h1 style="padding:16px;">AOR 9 · King Model</h1>

<model-viewer
  src="./assets/model/kingmodel.glb"
  alt="King model"
  ar
  ar-modes="quick-look scene-viewer webxr"
  camera-controls
  auto-rotate
  style="width:100%;height:70vh;background:#000;">

  <button slot="ar-button" style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);padding:12px 16px;background:#d4b27a;border:none;border-radius:10px;">
    Launch AR
  </button>

</model-viewer>

</body>
</html>
