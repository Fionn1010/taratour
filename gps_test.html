<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tara GPS Test</title>
</head>
<body>

<h1>GPS AR Test</h1>
<p>Walk around your house to trigger the experience.</p>

<script>
const TEST_LAT = 53.3498; // replace with your house
const TEST_LON = -6.2603;

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;

  const a = 
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

navigator.geolocation.watchPosition((pos) => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  const distance = getDistance(lat, lon, TEST_LAT, TEST_LON);

  console.log("Distance:", distance);

  if (distance < 10) {
    triggerAR();
  }
});

function triggerAR() {
  if (window.triggered) return;
  window.triggered = true;

  alert("🎉 AR Experience Triggered!");
}
</script>

</body>
</html>
