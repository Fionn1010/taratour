<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hill of Tara Tour</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07163a;
      color: white;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
    }

    video {
      width: 100%;
      border-radius: 12px;
      margin: 15px 0;
      background: black;
    }

    button {
      padding: 14px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #startTour {
      background: #22c55e;
      width: 100%;
      font-weight: bold;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    .nav-buttons button {
      flex: 1;
      background: #f3f4f6;
      color: black;
    }
  </style>
</head>

<body>

  <!-- START SCREEN -->
  <div id="loadingScreen" class="container">
    <h1>Hill of Tara Tour</h1>
    <p>Welcome to your walking tour experience.</p>
    <button id="startTour">Start Walking Tour</button>
    <p>Ready</p>
  </div>

  <!-- TOUR SCREEN -->
  <div id="tourScreen" class="container hidden">
    <h2 id="sceneTitle">Loading...</h2>
    <p id="sceneDescription"></p>

    <video id="sceneVideo" controls playsinline></video>

    <div class="nav-buttons">
      <button id="prevStopBtn">Previous</button>
      <button id="nextStopBtn">Next</button>
    </div>
  </div>

  <script src="./app.js"></script>

</body>
</html>
