<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill of Tara Tour</title>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.container{max-width:800px;margin:auto;}
video{width:100%;border-radius:12px;background:black;}
button{padding:12px;margin:6px;border-radius:8px;border:none;cursor:pointer;}
.primary{background:#22c55e;color:#052e16;}
</style>
</head>

<body>

<div class="container">

<h1>Hill of Tara Tour</h1>

<button class="primary" onclick="playVideo()">Play Entrance Video</button>

<video id="tourVideo" controls playsinline webkit-playsinline>
  <source src="assets/video/entrance.mp4" type="video/mp4">
</video>

<p id="status">Ready</p>

</div>

<script>

const video = document.getElementById("tourVideo")
const status = document.getElementById("status")

function playVideo(){
  const playPromise = video.play()

  if (playPromise !== undefined){
    playPromise.catch(()=>{
      status.innerText = "Tap play on the video"
    })
  }
}

</script>

</body>
</html>
