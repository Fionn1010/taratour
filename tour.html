<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hill of Tara Tour</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07163a;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    p {
      color: #d1d5db;
    }

    video {
      width: 100%;
      border-radius: 12px;
      margin: 15px 0;
      background: black;
    }

    .meta {
      margin-bottom: 12px;
    }

    button {
      padding: 14px;
      margin: 5px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #startTour {
      background: #22c55e;
      color: #052e16;
      width: 100%;
      font-weight: bold;
    }

    .nav-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .nav-buttons button,
    .extra-buttons button {
      background: #f3f4f6;
      color: #111827;
      width: 100%;
    }

    .extra-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    #locationDot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6b7280;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="loadingScreen" class="container">
    <h1>Hill of Tara Tour</h1>
    <p>Welcome to your walking tour experience.</p>
    <button id="startTour">Start Walking Tour</button>

    <div id="gpsStatus" class="status">
      <span id="locationDot"></span>
      <span>Ready</span>
    </div>
  </div>

  <div id="tourScreen" class="container hidden">
    <div class="card">
      <h2 id="sceneTitle">Loading...</h2>
      <p id="sceneDescription"></p>

      <div class="meta">
        <p id="nearestStop">Nearest stop: —</p>
        <p id="distanceAway">Distance: —</p>
      </div>

      <video id="sceneVideo" controls playsinline preload="metadata"></video>

      <div class="nav-buttons">
        <button id="prevStopBtn">Previous</button>
        <button id="nextStopBtn">Next</button>
      </div>

      <div class="extra-buttons">
        <button id="playNarrationBtn">Play Narration</button>
        <button id="stopTourBtn">Stop Narration</button>
        <button id="recenterBtn">Check My Location</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
